<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#e8f1ec" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="description" content="簡単な収支メモ。初期残高・日付・項目名・収入支出から残額を計算します。" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <title>収支メモ — Club Scout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=IBM+Plex+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* 単体ファイルでも読める高コントラスト配色（外部CSS不要） */
    :root {
      --ink: #14201a;
      --muted: #3d5248;
      --line: #9bb5a6;
      --paper: #f3f7f4;
      --panel: #ffffff;
      --brand: #1f6b45;
      --brand-deep: #145234;
      --gold: #8a6508;
      --income: #0b6b3a;
      --income-bg: #dff5e8;
      --income-line: #8fd4ae;
      --expense: #b42318;
      --expense-bg: #fde8e6;
      --expense-line: #f0a39c;
      --warn-bg: #fff4d6;
      --warn-ink: #6b4e00;
      --ok-bg: #e5f7ec;
      --ok-ink: #0f5c34;
      --err-bg: #fdeceb;
      --err-ink: #8f1d14;
      --shadow: 0 1px 0 rgba(20, 32, 26, 0.04), 0 8px 22px rgba(20, 32, 26, 0.06);
      --font-d: "Shippori Mincho", "Hiragino Mincho ProN", serif;
      --font-b: "IBM Plex Sans JP", "Hiragino Sans", "Noto Sans JP", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      font-family: var(--font-b);
      color: var(--ink);
      line-height: 1.55;
      background:
        radial-gradient(900px 420px at 0% -10%, rgba(31, 107, 69, 0.12), transparent 55%),
        radial-gradient(700px 360px at 100% 0%, rgba(138, 101, 8, 0.10), transparent 50%),
        linear-gradient(180deg, #e8f1ec 0%, var(--paper) 40%, #eef3f0 100%);
      background-attachment: fixed;
    }
    a { color: var(--brand-deep); font-weight: 600; }
    a:hover { text-decoration: underline; }
    .wrap { width: min(760px, 100%); margin: 0 auto; padding: 14px 14px 56px; }
    .topnav {
      position: sticky; top: 0; z-index: 20;
      display: flex; gap: 6px; flex-wrap: wrap;
      padding: 8px 0 10px;
      background: linear-gradient(180deg, rgba(232,241,236,.97), rgba(232,241,236,.9) 70%, transparent);
      backdrop-filter: blur(6px);
    }
    .topnav a {
      font-size: 0.78rem; font-weight: 700; color: var(--ink);
      border: 1px solid var(--line); border-radius: 999px;
      padding: 7px 12px; background: var(--panel);
      text-decoration: none;
    }
    .topnav a.on {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }
    .kicker {
      margin: 4px 0 0;
      font-size: 0.72rem;
      letter-spacing: .14em;
      font-weight: 700;
      color: var(--brand);
    }
    .brand {
      font-family: var(--font-d);
      font-size: clamp(1.7rem, 6.2vw, 2.2rem);
      margin: 4px 0 6px;
      font-weight: 700;
      letter-spacing: .03em;
      color: var(--brand-deep);
    }
    .sub { color: var(--muted); margin: 0 0 14px; font-size: 0.9rem; }
    .card {
      border: 1px solid #c7d7ce;
      border-radius: 14px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 14px 14px 12px;
      margin: 0 0 12px;
    }
    .card h2 {
      margin: 0 0 10px;
      font-family: var(--font-d);
      font-size: 1.08rem;
      color: var(--brand-deep);
      letter-spacing: .02em;
    }
    .note { color: var(--muted); font-size: 0.84rem; margin: 10px 0 0; font-weight: 500; }
    .note.warn {
      color: var(--warn-ink);
      background: var(--warn-bg);
      border: 1px solid #e6c76a;
      border-radius: 10px;
      padding: 8px 10px;
    }
    .note.ok {
      color: var(--ok-ink);
      background: var(--ok-bg);
      border: 1px solid #8fd4ae;
      border-radius: 10px;
      padding: 8px 10px;
      font-weight: 700;
    }
    label.field {
      display: grid; gap: 5px;
      font-size: 0.8rem; color: var(--muted); font-weight: 700;
      margin-bottom: 10px;
    }
    input, select, textarea, button {
      font: inherit;
      border-radius: 10px;
      border: 1.5px solid #9eb5a8;
      background: #fff;
      color: var(--ink);
      padding: 11px 12px;
    }
    input::placeholder { color: #6f877b; opacity: 1; }
    input:focus, select:focus, textarea:focus {
      outline: 2px solid rgba(31, 107, 69, 0.35);
      border-color: var(--brand);
    }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    @media (max-width: 560px) { .grid2 { grid-template-columns: 1fr; } }
    button.primary {
      border: 0;
      background: linear-gradient(135deg, #1f6b45, #248655);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      width: 100%;
      padding: 13px 12px;
      box-shadow: 0 2px 0 #145234;
    }
    button.primary:active { transform: translateY(1px); }
    button.ghost {
      border: 1.5px solid #9eb5a8;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      white-space: nowrap;
      padding: 11px 12px;
      font-weight: 700;
    }
    button.ghost.danger {
      color: var(--expense);
      border-color: #e0a19a;
      background: #fff8f7;
    }
    .foot { margin-top: 18px; color: var(--muted); font-size: 0.78rem; line-height: 1.55; }
    .muted { color: var(--muted); }

    .ledger-summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 0 0 12px;
    }
    .ledger-summary > div {
      background: var(--panel);
      border: 1.5px solid #c7d7ce;
      border-radius: 14px;
      padding: 12px;
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .ledger-summary > div.tile-balance {
      border-color: #d2b15a;
      background: linear-gradient(160deg, #fff9e9, #fff);
    }
    .ledger-summary-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 800;
      color: var(--muted);
      margin-bottom: 4px;
      letter-spacing: .02em;
    }
    .ledger-summary strong {
      display: block;
      font-variant-numeric: tabular-nums;
      font-size: clamp(1.05rem, 4.2vw, 1.25rem);
      color: var(--ink);
      word-break: break-all;
      font-weight: 800;
    }
    .amt-in { color: var(--income) !important; }
    .amt-out { color: var(--expense) !important; }
    .amt-pos { color: var(--gold) !important; }
    .amt-neg { color: var(--expense) !important; }

    .ledger-flash {
      margin: 0 0 12px;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1.5px solid var(--income-line);
      background: var(--ok-bg);
      color: var(--ok-ink);
      font-size: 0.9rem;
      font-weight: 700;
      display: none;
    }
    .ledger-flash.on { display: block; }
    .ledger-flash.err {
      border-color: #e0a19a;
      background: var(--err-bg);
      color: var(--err-ink);
    }
    .ledger-toolbar { display: flex; gap: 8px; align-items: end; margin-bottom: 10px; }
    .ledger-list { display: grid; gap: 8px; }
    .ledger-row {
      display: flex; gap: 10px; justify-content: space-between; align-items: flex-start;
      padding: 12px;
      border: 1.5px solid #c7d7ce;
      border-radius: 12px;
      background: #fff;
      box-shadow: var(--shadow);
    }
    .ledger-row.new { border-color: var(--brand); box-shadow: 0 0 0 2px rgba(31,107,69,.18); }
    .ledger-row-main { min-width: 0; flex: 1; }
    .ledger-row-top { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 4px; }
    .ledger-date {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .ledger-type {
      font-size: 0.72rem; font-weight: 800; padding: 3px 8px; border-radius: 999px;
      border: 1px solid transparent;
    }
    .ledger-type.income {
      color: var(--income);
      background: var(--income-bg);
      border-color: #8fd4ae;
    }
    .ledger-type.expense {
      color: var(--expense);
      background: var(--expense-bg);
      border-color: var(--expense-line);
    }
    .ledger-name { font-weight: 800; font-size: 1rem; color: var(--ink); }
    .ledger-memo { color: var(--muted); font-size: 0.8rem; margin-top: 3px; font-weight: 500; }
    .ledger-row-side { text-align: right; display: grid; gap: 6px; justify-items: end; }
    .ledger-amount {
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      font-size: 1.05rem;
    }
    #entryCount { color: var(--muted); font-size: .8rem; font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="topnav">
      <a href="./index.html">ホーム</a>
      <a href="./sheet/index.html">判断シート</a>
      <a href="./tool.html">ツール</a>
      <a href="./ledger.html" class="on">収支</a>
    </nav>
    <p class="kicker">SIMPLE LEDGER</p>
    <h1 class="brand">収支メモ</h1>
    <p class="sub">初期残高と日付は必須。項目名をつけて収入・支出を記録し、残額を自動で出します。この端末に保存されます。</p>

    <div id="flash" class="ledger-flash" role="status" aria-live="polite"></div>

    <section class="ledger-summary" id="summary" aria-live="polite">
      <div>
        <span class="ledger-summary-label">初期残高</span>
        <strong id="sumOpening">未設定</strong>
      </div>
      <div>
        <span class="ledger-summary-label">収入合計</span>
        <strong class="amt-in" id="sumIncome">¥0</strong>
      </div>
      <div>
        <span class="ledger-summary-label">支出合計</span>
        <strong class="amt-out" id="sumExpense">¥0</strong>
      </div>
      <div class="tile-balance">
        <span class="ledger-summary-label">残額</span>
        <strong id="sumBalance">—</strong>
      </div>
    </section>

    <section class="card" id="opening">
      <h2>1. 初期残高</h2>
      <div class="grid2">
        <label class="field">初期残高（円）*
          <input id="openingBalance" type="text" inputmode="numeric" autocomplete="off" placeholder="例: 50000" />
        </label>
        <label class="field">基準日*
          <input id="openingDate" type="date" />
        </label>
      </div>
      <button class="primary" type="button" id="btnSaveOpening">初期残高を保存</button>
      <p class="note" id="openingNote">未設定です。先に初期残高と基準日を入れてください。</p>
    </section>

    <section class="card" id="entry">
      <h2>2. 記録を追加</h2>
      <div class="grid2">
        <label class="field">日付*
          <input id="entryDate" type="date" />
        </label>
        <label class="field">区分*
          <select id="entryType">
            <option value="expense" selected>支出</option>
            <option value="income">収入</option>
          </select>
        </label>
        <label class="field">項目名*
          <input id="entryName" type="text" maxlength="80" placeholder="例: 給料 / 食費" autocomplete="off" />
        </label>
        <label class="field">金額（円）*
          <input id="entryAmount" type="text" inputmode="numeric" autocomplete="off" placeholder="例: 1200" />
        </label>
      </div>
      <label class="field">メモ（任意）
        <input id="entryMemo" type="text" maxlength="120" placeholder="任意" autocomplete="off" />
      </label>
      <button class="primary" type="button" id="btnAddEntry">追加する</button>
      <p class="note" id="entryNote"></p>
    </section>

    <section class="card" id="list">
      <h2>3. 一覧 <span id="entryCount"></span></h2>
      <div class="ledger-toolbar">
        <label class="field" style="margin:0;flex:1">絞り込み
          <select id="filterType">
            <option value="all">すべて</option>
            <option value="income">収入のみ</option>
            <option value="expense">支出のみ</option>
          </select>
        </label>
        <button type="button" class="ghost" id="btnClearAll">全削除</button>
      </div>
      <div id="entryList" class="ledger-list muted">まだ記録がありません。</div>
    </section>

    <p class="foot">
      データはこの端末のブラウザにのみ保存されます。簿記や確定申告用ではありません。<br />
      戻る: <a href="./index.html">ホーム</a>
    </p>
  </div>

  <script>
  (function () {
    "use strict";
    var STORAGE_KEY = "club-scout-ledger-v1";
    var lastAddedId = null;

    function $(id) {
      var el = document.getElementById(id);
      if (!el) throw new Error("missing #" + id);
      return el;
    }

    var els = {
      flash: $("flash"),
      openingBalance: $("openingBalance"),
      openingDate: $("openingDate"),
      btnSaveOpening: $("btnSaveOpening"),
      openingNote: $("openingNote"),
      sumOpening: $("sumOpening"),
      sumIncome: $("sumIncome"),
      sumExpense: $("sumExpense"),
      sumBalance: $("sumBalance"),
      entryDate: $("entryDate"),
      entryType: $("entryType"),
      entryName: $("entryName"),
      entryAmount: $("entryAmount"),
      entryMemo: $("entryMemo"),
      btnAddEntry: $("btnAddEntry"),
      entryNote: $("entryNote"),
      filterType: $("filterType"),
      btnClearAll: $("btnClearAll"),
      entryList: $("entryList"),
      entryCount: $("entryCount"),
    };

    function todayISO() {
      var d = new Date();
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1);
      var day = String(d.getDate());
      if (m.length < 2) m = "0" + m;
      if (day.length < 2) day = "0" + day;
      return y + "-" + m + "-" + day;
    }

    function normalizeDigits(raw) {
      return String(raw == null ? "" : raw)
        .replace(/[０-９]/g, function (ch) {
          return String.fromCharCode(ch.charCodeAt(0) - 0xFEE0);
        })
        .replace(/,/g, "")
        .replace(/[￥¥円\s]/g, "")
        .trim();
    }

    function parseAmount(raw) {
      var s = normalizeDigits(raw);
      if (!s) return NaN;
      var n = Number(s);
      return Number.isFinite(n) ? n : NaN;
    }

    function loadState() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { opening: null, entries: [] };
        var parsed = JSON.parse(raw);
        return {
          opening: parsed && parsed.opening && typeof parsed.opening === "object" ? parsed.opening : null,
          entries: parsed && Array.isArray(parsed.entries) ? parsed.entries : [],
        };
      } catch (err) {
        return { opening: null, entries: [] };
      }
    }

    function saveState(next) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
        var check = localStorage.getItem(STORAGE_KEY);
        return !!check;
      } catch (err) {
        return false;
      }
    }

    function formatYen(n) {
      if (!Number.isFinite(n)) return "—";
      try {
        return new Intl.NumberFormat("ja-JP", {
          style: "currency",
          currency: "JPY",
          maximumFractionDigits: 0,
        }).format(Math.round(n));
      } catch (e) {
        return "¥" + String(Math.round(n));
      }
    }

    function formatSignedYen(n, type) {
      var body = formatYen(n).replace(/[￥¥]/g, "");
      return (type === "income" ? "+" : "−") + body;
    }

    function uid() {
      return Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8);
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function showFlash(msg, isError) {
      els.flash.textContent = msg;
      els.flash.className = "ledger-flash on" + (isError ? " err" : "");
    }

    var state = loadState();

    function ensureDefaults() {
      if (!els.entryDate.value) els.entryDate.value = todayISO();
      if (state.opening) {
        els.openingBalance.value = String(state.opening.amount);
        els.openingDate.value = state.opening.date;
      } else if (!els.openingDate.value) {
        els.openingDate.value = todayISO();
      }
    }

    function totals() {
      var income = 0;
      var expense = 0;
      for (var i = 0; i < state.entries.length; i++) {
        var e = state.entries[i];
        var amt = Number(e.amount) || 0;
        if (e.type === "income") income += amt;
        else expense += amt;
      }
      var opening = state.opening ? Number(state.opening.amount) : null;
      var balance = opening == null || !Number.isFinite(opening) ? null : opening + income - expense;
      return { opening: opening, income: income, expense: expense, balance: balance };
    }

    function renderSummary() {
      var t = totals();
      els.sumOpening.textContent =
        t.opening == null || !Number.isFinite(t.opening) ? "未設定" : formatYen(t.opening);
      els.sumIncome.textContent = formatYen(t.income);
      els.sumExpense.textContent = formatYen(t.expense);
      els.sumBalance.textContent = t.balance == null ? "—" : formatYen(t.balance);
      els.sumBalance.classList.toggle("amt-neg", t.balance != null && t.balance < 0);
      els.sumBalance.classList.toggle("amt-pos", t.balance != null && t.balance >= 0);

      if (state.opening) {
        els.openingNote.textContent =
          "保存済み: " + state.opening.date + " 時点で " + formatYen(state.opening.amount);
        els.openingNote.className = "note ok";
      } else {
        els.openingNote.textContent = "未設定です。先に初期残高と基準日を入れてください。";
        els.openingNote.className = "note warn";
      }
      els.entryCount.textContent =
        state.entries.length > 0 ? "（" + state.entries.length + "件）" : "";
    }

    function sortedEntries() {
      var filter = els.filterType.value;
      return state.entries
        .filter(function (e) {
          return filter === "all" || e.type === filter;
        })
        .slice()
        .sort(function (a, b) {
          if (a.date !== b.date) return b.date < a.date ? -1 : 1;
          return (b.createdAt || 0) - (a.createdAt || 0);
        });
    }

    function renderList() {
      var rows = sortedEntries();
      if (!rows.length) {
        els.entryList.className = "ledger-list muted";
        els.entryList.textContent = state.entries.length
          ? "この絞り込みでは表示する記録がありません。"
          : "まだ記録がありません。";
        return;
      }

      els.entryList.className = "ledger-list";
      var html = "";
      for (var i = 0; i < rows.length; i++) {
        var e = rows[i];
        var typeLabel = e.type === "income" ? "収入" : "支出";
        var amtClass = e.type === "income" ? "amt-in" : "amt-out";
        var isNew = e.id === lastAddedId ? " new" : "";
        html +=
          '<article class="ledger-row' +
          isNew +
          '" data-id="' +
          escapeHtml(e.id) +
          '">' +
          '<div class="ledger-row-main">' +
          '<div class="ledger-row-top">' +
          '<span class="ledger-date">' +
          escapeHtml(e.date) +
          "</span>" +
          '<span class="ledger-type ' +
          e.type +
          '">' +
          typeLabel +
          "</span>" +
          "</div>" +
          '<div class="ledger-name">' +
          escapeHtml(e.name) +
          "</div>" +
          (e.memo ? '<div class="ledger-memo">' + escapeHtml(e.memo) + "</div>" : "") +
          "</div>" +
          '<div class="ledger-row-side">' +
          '<div class="ledger-amount ' +
          amtClass +
          '">' +
          formatSignedYen(e.amount, e.type) +
          "</div>" +
          '<button type="button" class="ghost danger" data-del="' +
          escapeHtml(e.id) +
          '">削除</button>' +
          "</div></article>";
      }
      els.entryList.innerHTML = html;
    }

    function render() {
      renderSummary();
      renderList();
    }

    function setEntryNote(msg, isError) {
      els.entryNote.textContent = msg || "";
      els.entryNote.className = "note" + (msg ? (isError ? " warn" : " ok") : "");
    }

    function saveOpeningFromInputs() {
      var amount = parseAmount(els.openingBalance.value);
      var date = (els.openingDate.value || "").trim();
      if (!date) {
        els.openingNote.textContent = "基準日は必須です。";
        els.openingNote.className = "note warn";
        showFlash("基準日を入れてください。", true);
        return false;
      }
      if (!Number.isFinite(amount)) {
        els.openingNote.textContent = "初期残高（数値）は必須です。";
        els.openingNote.className = "note warn";
        showFlash("初期残高に数字を入れてください。", true);
        return false;
      }
      state.opening = { amount: Math.round(amount), date: date };
      if (!saveState(state)) {
        showFlash("保存に失敗しました。プライベートブラウズでは使えないことがあります。", true);
        return false;
      }
      render();
      showFlash(
        "初期残高を保存しました: " + formatYen(state.opening.amount) + "（残額に反映済み）"
      );
      return true;
    }

    function addEntry() {
      if (!state.opening) {
        if (!saveOpeningFromInputs()) {
          setEntryNote("先に初期残高と基準日を入れてください。", true);
          els.openingBalance.focus();
          return;
        }
      }

      var date = (els.entryDate.value || "").trim();
      var name = (els.entryName.value || "").trim();
      var amount = parseAmount(els.entryAmount.value);
      var type = els.entryType.value === "income" ? "income" : "expense";
      var memo = (els.entryMemo.value || "").trim();

      if (!date) {
        setEntryNote("日付は必須です。", true);
        showFlash("日付を入れてください。", true);
        els.entryDate.focus();
        return;
      }
      if (!name) {
        setEntryNote("項目名は必須です。", true);
        showFlash("項目名を入れてください。", true);
        els.entryName.focus();
        return;
      }
      if (!Number.isFinite(amount) || amount <= 0) {
        setEntryNote("金額は1円以上の数字で入力してください。", true);
        showFlash("金額は1円以上の数字で入力してください。", true);
        els.entryAmount.focus();
        return;
      }

      var item = {
        id: uid(),
        date: date,
        name: name,
        type: type,
        amount: Math.round(amount),
        memo: memo,
        createdAt: Date.now(),
      };
      state.entries.push(item);
      if (!saveState(state)) {
        state.entries.pop();
        setEntryNote("保存に失敗しました。", true);
        showFlash("保存に失敗しました。", true);
        return;
      }

      lastAddedId = item.id;
      els.entryName.value = "";
      els.entryAmount.value = "";
      els.entryMemo.value = "";
      els.entryDate.value = todayISO();
      setEntryNote("追加しました。残額を更新しました。", false);
      render();

      var t = totals();
      showFlash(
        (type === "income" ? "収入" : "支出") +
          "「" +
          name +
          "」" +
          formatYen(item.amount) +
          " を追加。残額 " +
          formatYen(t.balance)
      );

      try {
        var row = els.entryList.querySelector('[data-id="' + item.id + '"]');
        if (row && row.scrollIntoView) row.scrollIntoView({ behavior: "smooth", block: "nearest" });
      } catch (e) {}
      els.entryName.focus();
    }

    els.btnSaveOpening.addEventListener("click", function (ev) {
      ev.preventDefault();
      saveOpeningFromInputs();
    });

    els.btnAddEntry.addEventListener("click", function (ev) {
      ev.preventDefault();
      addEntry();
    });

    // Enter でも追加（テキスト欄）
    [els.entryName, els.entryAmount, els.entryMemo].forEach(function (input) {
      input.addEventListener("keydown", function (ev) {
        if (ev.key === "Enter") {
          ev.preventDefault();
          addEntry();
        }
      });
    });
    [els.openingBalance].forEach(function (input) {
      input.addEventListener("keydown", function (ev) {
        if (ev.key === "Enter") {
          ev.preventDefault();
          saveOpeningFromInputs();
        }
      });
    });

    els.entryList.addEventListener("click", function (ev) {
      var t = ev.target;
      while (t && t !== els.entryList && !(t.getAttribute && t.getAttribute("data-del"))) {
        t = t.parentNode;
      }
      if (!t || t === els.entryList) return;
      var id = t.getAttribute("data-del");
      if (!window.confirm("この記録を削除しますか？")) return;
      state.entries = state.entries.filter(function (e) {
        return e.id !== id;
      });
      saveState(state);
      lastAddedId = null;
      render();
      showFlash("削除しました。残額を更新しました。");
    });

    els.filterType.addEventListener("change", render);

    els.btnClearAll.addEventListener("click", function () {
      if (!state.entries.length) return;
      if (!window.confirm("すべての記録を削除しますか？（初期残高は残ります）")) return;
      state.entries = [];
      saveState(state);
      lastAddedId = null;
      render();
      showFlash("記録をすべて削除しました。");
    });

    try {
      ensureDefaults();
      render();
      showFlash("準備完了。初期残高を入れて保存し、記録を追加してください。");
    } catch (err) {
      showFlash("初期化に失敗: " + (err && err.message ? err.message : err), true);
    }
  })();
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
